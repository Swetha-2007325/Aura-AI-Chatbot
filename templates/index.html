<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="logo">&#9679; AI Chat</span>
      <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
    </div>
    <ul class="history-list" id="historyList">
      <!-- Chat history items injected here -->
    </ul>
  </aside>

  <!-- Overlay for mobile -->
  <div class="overlay" id="overlay"></div>

  <!-- Main -->
  <main class="main">

    <!-- Top bar -->
    <header class="topbar">
      <button class="menu-btn" id="menuBtn">&#9776;</button>
      <span class="topbar-title">New Conversation</span>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-icon">&#128214;</div>
        <h2>How can I help you today?</h2>
        <p>Ask me anything — I'm here to chat.</p>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="userInput"
          placeholder="Send a message..."
          rows="1"
        ></textarea>
        <button id="sendBtn" class="send-btn" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <p class="disclaimer">This is a demo — responses are randomly generated.</p>
    </div>

  </main>

  <script src="/static/script.js"></script>
</body>
</html>
