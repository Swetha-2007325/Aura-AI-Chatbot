<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura AI · Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- Animated background mesh -->
  <div class="bg-gradient"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">

      <!-- Logo -->
      <div class="logo">
        <div class="logo-mark">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-name">Aura AI</span>
          <span class="logo-sub">Powered by Groq</span>
        </div>
      </div>

      <button class="new-chat-btn" id="newChatBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New conversation
      </button>
    </div>

    <div class="history-label">Conversations</div>
    <ul class="history-list" id="historyList"></ul>

    <div class="sidebar-footer">
      <span class="footer-dot"></span>
      Llama 3.3-70B · Groq
    </div>
  </aside>

  <!-- Mobile overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Main content -->
  <main class="main">

    <!-- Top bar -->
    <header class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Open menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="topbar-title" id="topbarTitle">New Conversation</span>
      <div class="topbar-badge">Groq</div>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages"></div>

    <!-- Input -->
    <div class="input-area-wrap">
      <div class="input-area">
        <div class="input-wrapper" id="inputWrapper">
          <textarea id="userInput" placeholder="Message Aura AI…" rows="1"></textarea>
          <button id="sendBtn" class="send-btn" title="Send" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
        <p class="disclaimer">Aura AI can make mistakes. Conversations are saved to your account.</p>
      </div>
    </div>

  </main>

  <script src="/static/script.js"></script>
</body>
</html>
