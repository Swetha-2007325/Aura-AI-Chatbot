<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura · AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- Animated background -->
  <div class="bg-gradient"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-orb"></span>
        Aura
      </div>
      <button class="new-chat-btn" id="newChatBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New conversation
      </button>
    </div>

    <div class="history-label">Recent</div>
    <ul class="history-list" id="historyList"></ul>

    <div class="sidebar-footer">
      <span>GPT-4o-mini · Firestore</span>
    </div>
  </aside>

  <!-- Overlay for mobile -->
  <div class="overlay" id="overlay"></div>

  <!-- Main -->
  <main class="main">

    <!-- Top bar -->
    <header class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="topbar-title" id="topbarTitle">New Conversation</span>
      <div class="topbar-badge">AI</div>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-glow"></div>
        <div class="welcome-orb">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/><path d="M12 8v4l3 3"/></svg>
        </div>
        <h1>Good to see you.</h1>
        <p>Ask me anything — I think clearly, respond fast,<br>and remember our conversation.</p>
        <div class="welcome-chips">
          <button class="chip" data-prompt="Explain quantum computing simply">Explain quantum computing</button>
          <button class="chip" data-prompt="Write a short poem about the ocean">Write me a poem</button>
          <button class="chip" data-prompt="Give me 5 productivity tips">Productivity tips</button>
        </div>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-wrapper" id="inputWrapper">
        <textarea id="userInput" placeholder="Ask anything…" rows="1"></textarea>
        <button id="sendBtn" class="send-btn" title="Send message" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <p class="disclaimer">Aura can make mistakes. Conversations saved to Firestore.</p>
    </div>

  </main>

  <script src="/static/script.js"></script>
</body>
</html>
